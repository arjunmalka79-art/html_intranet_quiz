<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Quiz - Quiz Platform</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(12px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-slate-50 flex flex-col">

  <!-- Top Header bar with progress and countdown -->
  <div class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <span class="p-1.5 bg-blue-50 rounded-lg text-blue-600">
          <i data-lucide="graduation-cap" class="w-5 h-5"></i>
        </span>
        <div class="leading-tight">
          <h2 class="text-sm font-bold text-slate-900 line-clamp-1" id="quiz-header-title">Loading Quiz...</h2>
          <span class="text-xs text-slate-500 font-medium" id="student-name-label">Candidate: </span>
        </div>
      </div>

      <!-- Countdown Clock -->
      <div class="flex items-center gap-2 bg-slate-100 px-3.5 py-1.5 rounded-xl border border-slate-200 shadow-inner">
        <i data-lucide="timer" class="w-4 h-4 text-slate-600" id="timer-icon"></i>
        <span class="font-mono text-sm font-bold text-slate-800" id="timer-display">00:00</span>
      </div>
    </div>
    
    <!-- Progress bar representing time remaining -->
    <div class="w-full bg-slate-100 h-1">
      <div class="h-full bg-blue-600 transition-all duration-1000" id="timer-progress-bar" style="width: 100%"></div>
    </div>
  </div>

  <!-- Loading State Area -->
  <div id="loader-area" class="flex-1 flex flex-col justify-center items-center">
    <div class="text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
      <p class="text-slate-600 mt-4 text-sm font-medium animate-pulse">Loading quiz workspace...</p>
    </div>
  </div>

  <!-- Main Active Quiz Body (Hidden initially) -->
  <main id="quiz-area" class="hidden flex-1 flex flex-col justify-center items-center px-4 py-8">
    <div class="max-w-2xl w-full bg-white border border-slate-200 shadow-md rounded-2xl p-6 sm:p-8 animate-slide-up">
      
      <!-- Header indicator row (Rounds, indices) -->
      <div class="flex justify-between items-center mb-6">
        <div class="flex gap-2">
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold border bg-blue-50 text-blue-700 border-blue-100" id="round-badge">
            Round 1 of 1
          </span>
          <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-semibold border bg-cyan-50 text-cyan-700 border-cyan-100" id="question-badge">
            Question 1 of 1
          </span>
        </div>
        
        <span class="text-xs font-semibold text-slate-400" id="quiz-code-label">
          Access Code: 
        </span>
      </div>

      <!-- Question Text -->
      <h1 class="text-lg sm:text-xl font-bold text-slate-900 mb-6 leading-snug" id="question-text-display">
        Question Text
      </h1>

      <!-- Option Radio List -->
      <div class="space-y-3 mb-8" id="options-container">
        <!-- Dynamically rendered options -->
      </div>

      <!-- Navigation and Submission Buttons row -->
      <div class="flex justify-between items-center pt-4 border-t border-slate-100 gap-4">
        <button
          type="button"
          id="prev-btn"
          class="inline-flex items-center gap-1.5 px-4 py-2.5 border border-slate-300 rounded-xl text-sm font-semibold text-slate-700 bg-white hover:bg-slate-50 transition disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer"
        >
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Previous
        </button>

        <button
          type="button"
          id="next-btn"
          class="inline-flex items-center gap-1.5 px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 transition shadow-sm cursor-pointer"
        >
          <span id="next-btn-text">Next Question</span>
          <i data-lucide="arrow-right" class="w-4 h-4" id="next-btn-icon"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- CDNs for JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
