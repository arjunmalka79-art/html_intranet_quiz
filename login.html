<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Authentication - Quiz Platform</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(12px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative">

  <!-- Back Nav Link -->
  <div class="absolute top-6 left-6">
    <a
      href="index.html"
      class="inline-flex items-center gap-1.5 text-sm font-semibold text-slate-500 hover:text-blue-600 transition-colors duration-200"
    >
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Back to Student Portal
    </a>
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md animate-slide-up">
    <div class="flex justify-center">
      <span class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-200">
        <i data-lucide="shield" class="w-8 h-8"></i>
      </span>
    </div>
    <h2 id="auth-title" class="mt-6 text-center text-3xl font-extrabold text-slate-900 tracking-tight">
      Sign in as a Teacher
    </h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      Or
      <button
        id="toggle-auth-mode"
        class="font-medium text-blue-600 hover:text-blue-500 transition-colors duration-200 cursor-pointer"
      >
        register for a new account
      </button>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-slide-up">
    <div class="bg-white py-8 px-4 shadow-md sm:rounded-2xl sm:px-10 border border-slate-100">
      <!-- Error / Success Alert Box -->
      <div id="alert-box" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

      <form id="auth-form" class="space-y-6">
        <!-- Full Name Group (Hidden in Sign In mode) -->
        <div id="fullname-group" class="hidden">
          <label for="fullname" class="block text-sm font-semibold text-slate-700">
            Full Name
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="user" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input
              id="fullname"
              type="text"
              placeholder="Jane Doe"
              class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 placeholder-slate-400 text-sm"
            />
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold text-slate-700">
            Email address
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="mail" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input
              id="email"
              type="email"
              required
              placeholder="you@example.com"
              class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 placeholder-slate-400 text-sm"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700">
            Password
          </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="h-5 w-5 text-slate-400"></i>
            </div>
            <input
              id="password"
              type="password"
              required
              placeholder="••••••••"
              class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 placeholder-slate-400 text-sm"
            />
          </div>
        </div>

        <div>
          <button
            type="submit"
            id="auth-submit-btn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 cursor-pointer"
          >
            Sign in
          </button>
        </div>
      </form>

      <!-- Google OAuth Section -->
      <div class="mt-6">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-slate-500">Or continue with</span>
          </div>
        </div>

        <div class="mt-6">
          <button
            type="button"
            id="google-login-btn"
            class="w-full inline-flex justify-center items-center py-3 px-4 border border-slate-300 rounded-xl shadow-sm bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-200 cursor-pointer"
          >
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- CDNs for JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
